name: CI

on:
  push:
    branches-ignore: []
  pull_request:

jobs:
  test:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run test suite
        # Unit tests + the AppTest smoke (full-pipeline runtime check).
        # Browser/kaleido image export is mocked in tests and the one real-render
        # test skips when no browser is present, so no system Chromium is needed here.
        run: python -m pytest -q
