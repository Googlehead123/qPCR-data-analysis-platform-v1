[theme]
# Cosmax-branded: red primary accent aligns native widgets (toggles, sliders,
# radios, checkboxes) with the app's red/monochrome design instead of leaking teal.
primaryColor = "#EA1D22"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F3F0ED"
textColor = "#1d1d1f"
font = "sans serif"

[server]
maxUploadSize = 200
